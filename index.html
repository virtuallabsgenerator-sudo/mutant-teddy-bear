<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accueil - Univers Teddy</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body class="page-accueil">
    
    <!-- Audio caché - Chemin CORRIGÉ -->
    <audio id="musiqueAccueil" src="/presentation/musique/mutant-teddy-bear-01-mp3.mp3" preload="auto" loop></audio>
    
    <!-- Image d'accueil cliquable - Chemin CORRIGÉ -->
    <a href="/menu.html" class="lien-accueil" id="lienMusique">
        <img src="/images/design/font-presentation/presentation-04.webp" 
             alt="Page d'accueil" 
             class="image-accueil">
    </a>
    
    <!-- Bouton flottant -->
    <div style="position: fixed; bottom: 20px; right: 20px; z-index: 1000;">
        <button id="boutonMusique" style="padding: 10px 20px; background: rgba(0,0,0,0.7); color: white; border: none; border-radius: 30px; cursor: pointer;">
            🔇 Couper la musique
        </button>
    </div>
    
    <script>
        // Récupère les éléments
        const lien = document.getElementById('lienMusique');
        const audio = document.getElementById('musiqueAccueil');
        const bouton = document.getElementById('boutonMusique');
        
        // État initial
        if (localStorage.getItem('musiqueJoue') === 'true') {
            audio.play().catch(e => console.log("Lecture bloquée"));
            bouton.textContent = '🔊 Couper la musique';
        }
        
        // Clic sur l'image
        lien.addEventListener('click', function(event) {
            audio.play().then(() => {
                localStorage.setItem('musiqueJoue', 'true');
                console.log("Musique lancée");
            }).catch(error => {
                console.log("Erreur de lecture:", error);
                alert("La musique n'a pas pu être lue. Vérifiez que le fichier existe à : /images/design/presentation/musique/mutant-teddy-bear-01-mp3.mp3");
            });
            // Le lien redirige normalement
        });
        
        // Clic sur le bouton
        bouton.addEventListener('click', function() {
            if (audio.paused) {
                audio.play();
                bouton.textContent = '🔊 Couper la musique';
                localStorage.setItem('musiqueJoue', 'true');
            } else {
                audio.pause();
                bouton.textContent = '🔇 Activer la musique';
                localStorage.setItem('musiqueJoue', 'false');
            }
        });
    </script>
</body>
</html>
